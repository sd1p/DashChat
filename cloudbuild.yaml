# Cloud Build pipeline for the DashChat backend → Cloud Run.
#
# Runs on every push to master (via the Cloud Build trigger, filtered to backend
# paths) and can also be invoked manually:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Builds the lowercase `dockerfile` explicitly (the `gcloud builds submit --tag`
# shortcut only accepts a file named `Dockerfile`), pushes to Artifact Registry
# tagged with both :latest and the commit SHA, then deploys to Cloud Run.
substitutions:
  _REGION: asia-northeast1
  _SERVICE: dashchat-backend
  _IMAGE: asia-northeast1-docker.pkg.dev/dashchat-392309/dashchat/backend

steps:
  # 1. Build (tag with commit SHA + latest). SHORT_SHA is empty for manual
  #    submits without a commit context; the `:manual` fallback keeps the tag valid.
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        TAG="${SHORT_SHA:-manual}"
        docker build -f dockerfile -t "$_IMAGE:$$TAG" -t "$_IMAGE:latest" .

  # 2. Push both tags
  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "--all-tags", "$_IMAGE"]

  # 3. Deploy the :latest image to Cloud Run (preserves existing env vars,
  #    scaling, and domain mapping — only the image/revision changes).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_IMAGE:latest
      - --region=$_REGION
      - --platform=managed
      - --quiet

images:
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
